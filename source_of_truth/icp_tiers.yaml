# Plik jest GŁÓWNYM źródłem segmentacji odbiorców dla wszystkich kampanii.
# Obowiązuje globalnie: Apollo, CSV Import, AdHoc, LinkedIn, News,
# konferencyjne, rewrite, walidacja, scoring.
