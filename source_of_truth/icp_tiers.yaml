# ─────────────────────────────────────────────────────────────────────────────
# REGUŁY CONDITIONAL TIER 2 OR 3
# ─────────────────────────────────────────────────────────────────────────────

conditional_tier_rules:
  description: >
    Reguły rozstrzygania ról warunkowych (procurement manager, purchasing manager).
  assign_tier_2_if:
    - stanowisko zawiera "head"
    - stanowisko zawiera "director"
    - stanowisko zawiera "lead"
    - stanowisko zawiera "team"
    - stanowisko zawiera "manager of"
    - stanowisko zawiera "department"
    - stanowisko zawiera "regional"
    - stanowisko zawiera "group"
    - wskazuje odpowiedzialność za zespół lub funkcję
  assign_tier_3_if:
    - stanowisko wskazuje prowadzenie kategorii operacyjnie
    - stanowisko wskazuje sourcing lub zakupy operacyjne bez odpowiedzialności za zespół
  fallback: tier_uncertain
