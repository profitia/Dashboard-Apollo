  - id: tworzywa_online
    label: "Tworzywa Online"
    enabled: true
    base_url: "https://tworzywa.online"

    scan_urls:
      - url: "https://tworzywa.online/wiadomosci/"
        label: "Wiadomości — lista artykułów"
        type: article_index

    article_list_selectors:
      article_link: "a[href*='/wiadomosci/']"
      title: ".entry-title, h2"
      date: "time[datetime], .post-date"

    article_selectors:
      title: ".entry-title, h1.entry-title"
      lead: ".entry-summary, .excerpt, p:first-of-type"
      body: ".entry-content, .post-content, article .content"
      date: "time[datetime], .post-date, meta[property='article:published_time']"
      tags: ".tags a, .post-tags a"
      canonical: "link[rel='canonical']"

    paywall:
      mode: public
      paywall_indicators: []

    scrape_options:
      user_agent: "Mozilla/5.0 (compatible; Profitia-OutreachBot/1.0)"
      request_delay_ms: 1000
      timeout_s: 15
      follow_redirects: true
      max_articles_per_scan: 30
