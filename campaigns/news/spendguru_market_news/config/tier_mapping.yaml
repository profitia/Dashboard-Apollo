# =============================================================================
# tier_mapping.yaml — Mapowanie stanowisk do tierów ICP
# =============================================================================
# Używa icp_tiers.yaml jako źródła definicji tierów.
# Ten plik rozszerza mapowanie dla kampanii news (produkcja / FMCG).
# Wpisy case-insensitive. Obsługiwane wersje PL i EN.
# =============================================================================

# Mapping: exact / partial title → tier_id
# Kolejność sprawdzania: tier_1 → tier_2 → tier_3
# Jeśli brak dopasowania → tier_uncertain

tier_1_titles:
  label: "Tier 1 — C-Level / Zarząd / Właściciele"
  # ZASADA: tylko role z listy per spec kampanii.
  # ZAKAZANE w Tier 1: CPO (→ Tier 2), general manager, country manager.
  titles:
    # C-Suite PL
    - "prezes zarządu"
    - "wiceprezes zarządu"
    - "prezes"
    - "dyrektor zarządzający"
    - "dyrektor generalny"
    - "dyrektor naczelny"
    - "dyrektor operacyjny"
    - "dyrektor finansowy"
    - "właściciel"
    - "współwłaściciel"
    - "założyciel"
    - "współzałożyciel"
    - "członek zarządu"
    - "wiceprezes"

    # C-Suite EN
    - "CEO"
    - "CFO"
    - "COO"
    - "Chief Executive Officer"
    - "Chief Financial Officer"
    - "Chief Operating Officer"
    - "board member"
    - "member of the board"
    - "managing director"
    - "managing partner"
    - "founder"
    - "co-founder"
    - "owner"
    - "president"
    - "chairman"

tier_2_titles:
  label: "Tier 2 — Procurement Management / Liderzy zakupów"
  # ZASADA DWUSKŁADNIKOWA: tytuł musi zawierać:
  #   poziom: head / director / chief / dyrektor
  #   ORAZ komponent zakupowy: procurement / purchasing / zakup / sourcing
  # Przykłady poprawne: "Head of Procurement", "Dyrektor Zakupów"
  # Przykłady błędne: "Director", "Operations Director", "Head"
  titles:
    # PL
    - "dyrektor zakupów"
    - "dyrektor ds. zakupów"
    - "dyrektor ds. zaopatrzenia"
    - "dyrektor zaopatrzenia"
    - "szef zakupów"
    - "head of zakupów"
    - "dyrektor ds. supply chain"
    - "dyrektor łańcucha dostaw"
    - "dyrektor operacji zakupowych"

    # EN — spec roles
    - "CPO"                            # Chief Procurement Officer — Tier 2 (nie Tier 1!)
    - "Chief Procurement Officer"
    - "procurement director"
    - "director of procurement"
    - "head of procurement"
    - "purchasing director"
    - "director of purchasing"
    - "sourcing director"
    - "head of sourcing"
    - "head of procurement and logistics"
    - "head of strategic procurement"
    - "director of procurement division"
    - "head of procurement department"
    - "head of group procurement"
    - "VP Procurement"
    - "VP Purchasing"
    - "VP Sourcing"
    - "global procurement manager"      # managerowie zarządzający globalnie
    - "regional procurement manager"

tier_3_titles:
  label: "Tier 3 — Buyers / Operational / Category Managers"
  titles:
    # PL
    - "kupiec"
    - "starszy kupiec"
    - "główny kupiec"
    - "specjalista ds. zakupów"
    - "specjalista zakupów"
    - "młodszy kupiec"
    - "category manager"
    - "brand manager"
    - "menedżer kategorii"
    - "koordynator zakupów"
    - "specjalista ds. zaopatrzenia"
    - "specjalista ds. sourcing"
    - "specjalista ds. dostawców"
    - "analityk zakupów"

    # EN
    - "buyer"
    - "senior buyer"
    - "strategic buyer"
    - "junior buyer"
    - "category manager"
    - "commodity manager"
    - "sourcing manager"
    - "procurement specialist"
    - "purchasing specialist"
    - "procurement analyst"
    - "supply planner"
    - "demand planner"
    - "logistics coordinator"
    - "supply chain coordinator"

# ---------------------------------------------------------------------------
# Keywords do klasyfikacji (partial match — jeśli tytuł zawiera słowo)
# ---------------------------------------------------------------------------
tier_keyword_hints:
  tier_1_keywords:
    - "prezes"
    - "właściciel"
    - "CEO"
    - "CFO"
    - "COO"
    # CPO → Tier 2 (Chief Procurement Officer) — celowo pominięty w Tier 1 keywords
    - "zarząd"
    - "board"
    - "managing director"
    - "founder"
    - "owner"
    - "president"
    - "chairman"

  tier_2_keywords:
    # Uwaga: keyword hints dla Tier 2 są weryfikowane dwuskładnikowo w contact_finder.py
    # (must have: head/director/chief/dyrektor + procurement/purchasing/zakup/sourcing)
    - "dyrektor zakupów"
    - "dyrektor zaopatrzenia"
    - "head of procurement"
    - "head of sourcing"
    - "procurement director"
    - "purchasing director"
    - "sourcing director"
    - "chief procurement"
    - "CPO"

  tier_3_keywords:
    - "kupiec"
    - "buyer"
    - "category manager"
    - "commodity manager"
    - "sourcing manager"
    - "procurement specialist"
    - "purchasing specialist"
    - "procurement analyst"
