# =============================================================================
# tier_mapping.yaml — Mapowanie stanowisk do tierów ICP
# =============================================================================
# Używa icp_tiers.yaml jako źródła definicji tierów.
# Ten plik rozszerza mapowanie dla kampanii news (produkcja / FMCG).
# Wpisy case-insensitive. Obsługiwane wersje PL i EN.
# =============================================================================

# Mapping: exact / partial title → tier_id
# Kolejność sprawdzania: tier_1 → tier_2 → tier_3
# Jeśli brak dopasowania → tier_uncertain

