# =============================================================================
# keywords.yaml — Grupy słów kluczowych do scoringu relevantności
# =============================================================================
# Każda grupa ma wagę (weight) — im wyżej, tym mocniejszy sygnał.
# Dodaj słowa kluczowe bez modyfikowania logiki aplikacji.
# Scoring: każde trafienie += weight * count (z normalizacją do 0-100).
# =============================================================================

# ---------------------------------------------------------------------------
# A. RELEVANCE BRANŻOWE (max 40 pkt)
# Artykuł musi trafić w co najmniej 1 branżę GTM.
#
# Model 3-warstwowy:
#   canonical label  — czytelna nazwa biznesowa (w raportach i dokumentacji)
#   technical key    — stabilny klucz YAML/scoringowy (snake_case)
#   terms            — słowa dopasowujące artykuły
#
# Canonical business labels (10 branż aktywnych):
#   retail | food production | food & beverages | packaging & containers |
#   plastics | chemicals | pharmaceuticals | building materials |
#   cosmetics | paper & forest products
#
# Grupy poniżej dzielą się na:
#   [CANONICAL]   — główna branża GTM (wprost w active_industry_scope)
#   [SUPPORTING]  — dodatkowe grupy scoringowe, nie są samodzielnymi branżami
# ---------------------------------------------------------------------------
industry_keywords:

  # [CANONICAL] retail
  retail:
    label: "Retail"
    weight: 3
    terms:
      - sieć handlowa
      - sieć sklepów
      - supermarket
